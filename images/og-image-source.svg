>
  <defs>
    <radialGradient id="glowA" cx="12%" cy="-5%" r="46%">
      <stop offset="0%" stop-color="#6200ee" stop-opacity="0.36" />
      <stop offset="100%" stop-color="#6200ee" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glowB" cx="78%" cy="95%" r="36%">
      <stop offset="0%" stop-color="#008b8b" stop-opacity="0.24" />
      <stop offset="100%" stop-color="#008b8b" stop-opacity="0" />
